name: Bug report
description: Report a defect in AuthKit's PKCE state binding middleware or session store.
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph summary of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal code path or curl invocation that reproduces the issue.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Rust toolchain version, axum version, AuthKit version.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true